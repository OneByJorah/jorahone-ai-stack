model_list:
  # ---- Hermes agent (you) — backed by llama-server, 65k ctx ----
  - model_name: hermes-agent
    litellm_params:
      model: openai/hermes-3-llama-3.1-8b
      api_base: http://llama-server:8080/v1
      api_key: "not-needed"

  # ---- IT team default — backed by Ollama, cold-load/unload ----
  - model_name: team-chat
    litellm_params:
      model: ollama/qwen2.5:7b-instruct-q4_K_M
      api_base: http://ollama:11434
      keep_alive: "5m"

  # Add more team-facing models here as needed, e.g.:
  # - model_name: team-chat-fast
  #   litellm_params:
  #     model: ollama/llama3.1:8b-instruct-q4_K_M
  #     api_base: http://ollama:11434

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: ""  # leave blank: no separate billing DB needed for this stack

litellm_settings:
  drop_params: true
  set_verbose: false
  # request_timeout handles Ollama cold-load delay (10-20s) gracefully
  request_timeout: 45
